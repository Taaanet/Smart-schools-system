{% extends "base.html" %}
{% block title %}{{ t('class_reports') }}{% endblock %}
{% block page_title %}<i class="fas fa-users"></i> {{ t('class_reports') }}{% endblock %}

{% block content %}
<div class="action-buttons">
    <button class="action-btn action-btn-pdf" onclick="window.print()"><i class="fas fa-file-pdf"></i> {{ t('print_pdf') }}</button>
    <button class="action-btn action-btn-excel" id="exportExcelBtn"><i class="fas fa-file-excel"></i> {{ t('export_excel') }}</button>
</div>

<div class="card">
    <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; align-items: flex-end;">
        <div><label style="display:block;font-size:12px;color:#718096;"><i class="fas fa-graduation-cap"></i> {{ t('grade') }}</label>
        <select id="gradeSelect" style="padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; min-width: 150px;">
            <option value="">{{ t('all_grades') }}</option>
            <option value="الأول الثانوي">{{ t('first_secondary') }}</option>
            <option value="الثاني الثانوي">{{ t('second_secondary') }}</option>
            <option value="الثالث الثانوي">{{ t('third_secondary') }}</option>
        </select></div>
        <div><label style="display:block;font-size:12px;color:#718096;"><i class="fas fa-layer-group"></i> {{ t('class') }}</label>
        <select id="classSelect" style="padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0;">
            <option value="">{{ t('all_classes') }}</option>
            <option value="1">{{ t('class') }} 1</option><option value="2">{{ t('class') }} 2</option><option value="3">{{ t('class') }} 3</option>
            <option value="4">{{ t('class') }} 4</option><option value="5">{{ t('class') }} 5</option><option value="6">{{ t('class') }} 6</option>
        </select></div>
        <div><label style="display:block;font-size:12px;color:#718096;"><i class="fas fa-calendar"></i> {{ t('date') }}</label>
        <input type="date" id="dateSelect" style="padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0;"></div>
        <button id="filterBtn" style="padding: 12px 30px; background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 12px; cursor: pointer;"><i class="fas fa-search"></i> {{ t('show') }}</button>
    </div>

    <div id="summaryStats" class="stats-summary" style="display: none;"></div>
    <div class="table-wrapper">
        <div id="reportTable"><div style="text-align:center;padding:60px;"><i class="fas fa-chart-line fa-2x" style="color:#cbd5e0;"></i><br>{{ t('select_class_date') }}</div></div>
    </div>
</div>

<script>
    const lang = '{{ lang }}';
    let currentData = [];

    function t(key) {
        const translations = {
            'present': lang === 'ar' ? '✅ حاضر' : '✅ Present',
            'late': lang === 'ar' ? '⏰ متأخر' : '⏰ Late',
            'absent': lang === 'ar' ? '❌ غائب' : '❌ Absent',
            'attendance_rate': lang === 'ar' ? 'نسبة الحضور' : 'Attendance Rate'
        };
        return translations[key] || key;
    }

    async function loadReport() {
        const grade = document.getElementById('gradeSelect').value;
        const classVal = document.getElementById('classSelect').value;
        const date = document.getElementById('dateSelect').value;
        if (!date) { alert(lang === 'ar' ? 'الرجاء اختيار التاريخ' : 'Please select a date'); return; }
        
        const res = await fetch(`/api/attendance_details/${date}`);
        const data = await res.json();
        
        if (data.success && data.data) {
            let filtered = data.data;
            if (grade) filtered = filtered.filter(s => s.grade === grade);
            if (classVal) filtered = filtered.filter(s => s.class === classVal);
            currentData = filtered;
            
            if (filtered.length === 0) {
                document.getElementById('reportTable').innerHTML = '<div style="text-align:center;padding:60px;"><i class="fas fa-search fa-2x" style="color:#cbd5e0;"></i><br>⚠️ ' + (lang === 'ar' ? 'لا توجد بيانات للعرض' : 'No data to display') + '</div>';
                document.getElementById('summaryStats').style.display = 'none';
                return;
            }
            
            const present = filtered.filter(s => s.status === 'حاضر في الوقت').length;
            const late = filtered.filter(s => s.status === 'متأخر').length;
            const absent = filtered.filter(s => s.status === 'غائب').length;
            const total = filtered.length;
            const percentage = total > 0 ? Math.round(((present + late) / total) * 100) : 0;
            
            document.getElementById('summaryStats').style.display = 'grid';
            document.getElementById('summaryStats').className = 'stats-summary';
            document.getElementById('summaryStats').innerHTML = `
                <div class="stat-summary-card present"><h4>✅ ${t('present')}</h4><div class="value" style="color:#48bb78;">${present}</div></div>
                <div class="stat-summary-card late"><h4>⏰ ${t('late')}</h4><div class="value" style="color:#ed8936;">${late}</div></div>
                <div class="stat-summary-card absent"><h4>❌ ${t('absent')}</h4><div class="value" style="color:#fc8181;">${absent}</div></div>
                <div class="stat-summary-card percentage"><h4>📊 ${t('attendance_rate')}</h4><div class="value" style="color:#667eea;">${percentage}%</div></div>
            `;
            
            let html = `<table class="report-table"><thead><tr><th>#</th><th>${lang === 'ar' ? 'رقم الطالب' : 'Student ID'}</th><th>${lang === 'ar' ? 'اسم الطالب' : 'Student Name'}</th><th>${lang === 'ar' ? 'الصف' : 'Grade'}</th><th>${lang === 'ar' ? 'الشعبة' : 'Class'}</th><th>${lang === 'ar' ? 'الحالة' : 'Status'}</th><th>${lang === 'ar' ? 'وقت التسجيل' : 'Time'}</th></tr></thead><tbody>`;
            
            filtered.forEach((s, i) => {
                let statusClass = s.status === 'حاضر في الوقت' ? 'present' : (s.status === 'متأخر' ? 'late' : 'absent');
                let statusText = s.status === 'حاضر في الوقت' ? t('present') : (s.status === 'متأخر' ? t('late') : t('absent'));
                html += `<tr>
                    <td>${i+1}</td>
                    <td>${s.student_id}</td>
                    <td><strong>${s.student_name}</strong></td>
                    <td>${s.grade}</td>
                    <td>${s.class}</td>
                    <td class="${statusClass}">${statusText}</td>
                    <td>${s.time}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('reportTable').innerHTML = html;
        }
    }
    
    function exportToExcel() {
        if (currentData.length === 0) { alert(lang === 'ar' ? 'لا توجد بيانات للتصدير' : 'No data to export'); return; }
        let csv = `${lang === 'ar' ? 'رقم الطالب,اسم الطالب,الصف,الشعبة,الحالة,وقت التسجيل' : 'Student ID,Student Name,Grade,Class,Status,Time'}\n`;
        currentData.forEach(s => {
            csv += `"${s.student_id}","${s.student_name}","${s.grade}","${s.class}","${s.status === 'حاضر في الوقت' ? (lang === 'ar' ? 'حاضر' : 'Present') : (s.status === 'متأخر' ? (lang === 'ar' ? 'متأخر' : 'Late') : (lang === 'ar' ? 'غائب' : 'Absent'))}","${s.time}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `class_report_${document.getElementById('dateSelect').value}.csv`;
        link.click();
    }
    
    document.getElementById('filterBtn').addEventListener('click', loadReport);
    document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
    document.getElementById('dateSelect').valueAsDate = new Date();
</script>
{% endblock %}
