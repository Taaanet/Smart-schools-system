{% extends "base.html" %}
{% block title %}{{ t('request_activation') }}{% endblock %}
{% block page_title %}🔑 {{ t('request_activation') }}{% endblock %}

{% block content %}
<div class="card">
    <h3><i class="fas fa-microchip"></i> {{ t('device_unique_id') }}</h3>
    <p>{{ t('request_instruction') }}</p>
    <div style="background: #f7fafc; padding: 15px; border-radius: 12px; margin: 20px 0; text-align: center; direction: ltr;">
        <code id="hardware-id" style="font-size: 18px; word-break: break-all;">{{ hardware_id }}</code>
    </div>
    <button onclick="copyToClipboard()" class="action-btn action-btn-excel" style="background:#4299e1;"><i class="fas fa-copy"></i> {{ t('copy_id') }}</button>
</div>

<script>
    function copyToClipboard() {
        const copyText = document.getElementById('hardware-id').innerText;
        navigator.clipboard.writeText(copyText).then(() => {
            alert('✅ ' + (lang === 'ar' ? 'تم نسخ معرف الجهاز!' : 'Device ID copied!'));
        });
    }
</script>
{% endblock %}
