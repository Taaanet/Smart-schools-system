<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلاب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ====== الأنماط العامة ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
        }
        /* ====== القائمة العلوية ====== */
        .navbar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar .nav-links a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .navbar .nav-links a.active {
            background: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        .navbar .user-info {
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .navbar .user-info .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }
        .navbar .user-info .logout-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        /* ====== الحاوية الرئيسية ====== */
        .students-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }
        h1 {
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* ====== أدوات التحكم (بحث + إضافة + فلاتر) ====== */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .controls .left-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .controls .left-group input,
        .controls .left-group select {
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            min-width: 150px;
        }
        .controls .left-group input:focus,
        .controls .left-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .controls .left-group button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .controls .left-group button:hover {
            background: #5a67d8;
        }
        .controls .left-group .btn-clear {
            background: #a0aec0;
        }
        .controls .left-group .btn-clear:hover {
            background: #718096;
        }
        .btn-add {
            padding: 10px 25px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }
        .btn-add:hover {
            background: #38a169;
        }
        /* ====== الجدول ====== */
        .table-wrapper {
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead {
            background: #f7fafc;
        }
        th {
            padding: 12px 15px;
            text-align: right;
            font-weight: 600;
            color: #2d3748;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        th:hover {
            background: #edf2f7;
        }
        th i {
            margin-right: 4px;
            font-size: 12px;
            color: #a0aec0;
        }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #e2e8f0;
            color: #4a5568;
        }
        tr:hover {
            background: #f7fafc;
        }
        .badge-email {
            font-size: 12px;
            color: #667eea;
            direction: ltr;
            unicode-bidi: embed;
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-edit {
            padding: 5px 12px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-delete {
            padding: 5px 12px;
            background: #fc8181;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-edit:hover { background: #3182ce; }
        .btn-delete:hover { background: #e53e3e; }
        /* ====== الحالات الفارغة والترقيم ====== */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 5px 12px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        /* ====== المودال ====== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            margin-top: 0;
            color: #2d3748;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #4a5568;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-save {
            padding: 10px 25px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-cancel-modal {
            padding: 10px 25px;
            background: #a0aec0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
        }
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
        }
        /* ====== التوافق مع الشاشات الصغيرة ====== */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .navbar .nav-links {
                justify-content: center;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .controls .left-group {
                flex-direction: column;
                align-items: stretch;
            }
            .controls .left-group input,
            .controls .left-group select {
                min-width: unset;
                width: 100%;
            }
            .btn-add {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- ====== القائمة العلوية (Navigation Bar) ====== -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-school"></i>
            <span>نظام حضور الطلاب</span>
        </div>
        <div class="nav-links">
            <a href="/dashboard"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="/scan"><i class="fas fa-camera"></i> تسجيل الحضور</a>
            <a href="/general_reports"><i class="fas fa-chart-bar"></i> التقارير</a>
            <a href="/manage_students" class="active"><i class="fas fa-users"></i> إدارة الطلاب</a>
            <a href="/backup"><i class="fas fa-database"></i> النسخ الاحتياطي</a>
            <a href="/users_list"><i class="fas fa-user-cog"></i> المستخدمين</a>
            <a href="/admin/upload_students"><i class="fas fa-upload"></i> رفع طلاب</a>
        </div>
        <div class="user-info">
            <span><i class="fas fa-user"></i> {{ session.get('username', 'Admin') }}</span>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> خروج</a>
        </div>
    </nav>

    <!-- ====== المحتوى الرئيسي ====== -->
    <div class="students-container">
        <h1><i class="fas fa-users"></i> إدارة الطلاب</h1>

        <!-- تنبيهات -->
        <div id="alert-container"></div>

        <!-- أدوات التحكم -->
        <div class="controls">
            <div class="left-group">
                <!-- فلتر الصف -->
                <select id="filterGrade">
                    <option value="">جميع الصفوف</option>
                    <option value="الأول الثانوي">الأول الثانوي</option>
                    <option value="الثاني الثانوي">الثاني الثانوي</option>
                    <option value="الثالث الثانوي">الثالث الثانوي</option>
                </select>
                <!-- فلتر الفصل -->
                <select id="filterClass">
                    <option value="">جميع الشعب</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
                <!-- مربع البحث -->
                <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو رقم الطالب...">
                <button onclick="applyFilters()"><i class="fas fa-search"></i> بحث</button>
                <button onclick="clearFilters()" class="btn-clear"><i class="fas fa-times"></i> مسح</button>
            </div>
            <button class="btn-add" onclick="openAddModal()">
                <i class="fas fa-plus"></i> إضافة طالب جديد
            </button>
        </div>

        <!-- الجدول -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable('student_id')">رقم الطالب <i class="fas fa-sort"></i></th>
                        <th onclick="sortTable('name')">اسم الطالب <i class="fas fa-sort"></i></th>
                        <th onclick="sortTable('grade')">الصف <i class="fas fa-sort"></i></th>
                        <th onclick="sortTable('class')">الشعبة <i class="fas fa-sort"></i></th>
                        <th>📧 البريد الإلكتروني</th>
                        <th>📧 بريد ولي الأمر</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="studentsTableBody">
                    <!-- يتم الملء بواسطة JavaScript -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-user-graduate" style="font-size: 48px; color: #cbd5e0;"></i>
                <p>لا توجد بيانات طلاب لعرضها</p>
            </div>
        </div>

        <!-- أزرار الترقيم -->
        <div class="pagination" id="paginationContainer"></div>
    </div>

    <!-- ====== مودال إضافة / تعديل طالب ====== -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">إضافة طالب جديد</h2>
            <form id="studentForm">
                <input type="hidden" id="editId" value="">
                
                <div class="form-group">
                    <label for="studentId">رقم الطالب *</label>
                    <input type="text" id="studentId" required>
                </div>
                <div class="form-group">
                    <label for="studentName">اسم الطالب *</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="form-group">
                    <label for="studentGrade">الصف</label>
                    <select id="studentGrade">
                        <option value="الأول الثانوي">الأول الثانوي</option>
                        <option value="الثاني الثانوي">الثاني الثانوي</option>
                        <option value="الثالث الثانوي">الثالث الثانوي</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="studentClass">الشعبة</label>
                    <select id="studentClass">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="studentPhone">هاتف الطالب (اختياري)</label>
                    <input type="text" id="studentPhone" placeholder="05xxxxxxxx">
                </div>
                <div class="form-group">
                    <label for="parentPhone">هاتف ولي الأمر (اختياري)</label>
                    <input type="text" id="parentPhone" placeholder="05xxxxxxxx">
                </div>
                <div class="form-group">
                    <label for="studentEmail">📧 البريد الإلكتروني للطالب (اختياري)</label>
                    <input type="email" id="studentEmail" placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label for="parentEmail">📧 بريد ولي الأمر (اختياري)</label>
                    <input type="email" id="parentEmail" placeholder="parent@example.com">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-cancel-modal" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn-save" id="saveBtn">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ====== جافا سكريبت ====== -->
    <script>
        // ==========================================================
        //  المتغيرات العامة
        // ==========================================================
        let allStudents = [];
        let filteredStudents = [];
        let currentPage = 1;
        const rowsPerPage = 20;
        let sortField = '';
        let sortAsc = true;

        // ==========================================================
        //  جلب بيانات الطلاب
        // ==========================================================
        async function loadStudents() {
            try {
                const response = await fetch('/api/students_list');
                const data = await response.json();
                if (data.success) {
                    allStudents = data.data;
                    applyFilters();
                } else {
                    showAlert('فشل تحميل البيانات', 'error');
                }
            } catch (error) {
                console.error('Error loading students:', error);
                showAlert('حدث خطأ في تحميل البيانات', 'error');
            }
        }

        // ==========================================================
        //  التصفية والترتيب
        // ==========================================================
        function applyFilters() {
            const gradeFilter = document.getElementById('filterGrade').value;
            const classFilter = document.getElementById('filterClass').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            filteredStudents = allStudents.filter(s => {
                const id = String(s.student_id || '').toLowerCase();
                const name = String(s.name || '').toLowerCase();
                const grade = String(s.grade || '');
                const cls = String(s.class || '');

                const matchGrade = gradeFilter ? grade === gradeFilter : true;
                const matchClass = classFilter ? cls === classFilter : true;
                const matchSearch = id.includes(searchTerm) || name.includes(searchTerm);
                return matchGrade && matchClass && matchSearch;
            });

            // ترتيب
            if (sortField) {
                filteredStudents.sort((a, b) => {
                    let va = a[sortField] || '';
                    let vb = b[sortField] || '';
                    if (typeof va === 'string') va = va.toLowerCase();
                    if (typeof vb === 'string') vb = vb.toLowerCase();
                    if (va < vb) return sortAsc ? -1 : 1;
                    if (va > vb) return sortAsc ? 1 : -1;
                    return 0;
                });
            }

            currentPage = 1;
            renderTable();
        }

        function clearFilters() {
            document.getElementById('filterGrade').value = '';
            document.getElementById('filterClass').value = '';
            document.getElementById('searchInput').value = '';
            applyFilters();
        }

        function sortTable(field) {
            if (sortField === field) {
                sortAsc = !sortAsc;
            } else {
                sortField = field;
                sortAsc = true;
            }
            applyFilters();
        }

        // ==========================================================
        //  عرض الجدول
        // ==========================================================
        function renderTable() {
            const totalPages = Math.ceil(filteredStudents.length / rowsPerPage);
            if (currentPage > totalPages) currentPage = 1;
            const start = (currentPage - 1) * rowsPerPage;
            const pageData = filteredStudents.slice(start, start + rowsPerPage);

            const tbody = document.getElementById('studentsTableBody');
            const empty = document.getElementById('emptyState');

            if (pageData.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                tbody.innerHTML = pageData.map(s => `
                    <tr>
                        <td>${s.student_id || '-'}</td>
                        <td>${s.name || '-'}</td>
                        <td>${s.grade || '-'}</td>
                        <td>${s.class || '-'}</td>
                        <td class="badge-email">${s.student_email || '-'}</td>
                        <td class="badge-email">${s.parent_email || '-'}</td>
                        <td>
                            <div class="actions">
                                <button class="btn-edit" onclick="openEditModal('${s.student_id}')">
                                    <i class="fas fa-edit"></i> تعديل
                                </button>
                                <button class="btn-delete" onclick="deleteStudent('${s.student_id}')">
                                    <i class="fas fa-trash"></i> حذف
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('paginationContainer');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            let html = '';
            if (currentPage > 1) {
                html += `<button onclick="goToPage(${currentPage - 1})">«</button>`;
            }
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            if (currentPage < totalPages) {
                html += `<button onclick="goToPage(${currentPage + 1})">»</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        // ==========================================================
        //  المودال (إضافة / تعديل)
        // ==========================================================
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة طالب جديد';
            document.getElementById('studentForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('studentId').disabled = false;
            document.getElementById('saveBtn').textContent = 'إضافة';
            document.getElementById('studentModal').style.display = 'flex';
        }

        function openEditModal(studentId) {
            const student = allStudents.find(s => String(s.student_id) === String(studentId));
            if (!student) {
                showAlert('الطالب غير موجود', 'error');
                return;
            }
            document.getElementById('modalTitle').textContent = 'تعديل بيانات الطالب';
            document.getElementById('editId').value = studentId;
            document.getElementById('studentId').value = student.student_id || '';
            document.getElementById('studentId').disabled = true;
            document.getElementById('studentName').value = student.name || '';
            document.getElementById('studentGrade').value = student.grade || 'الأول الثانوي';
            document.getElementById('studentClass').value = student.class || '1';
            document.getElementById('studentPhone').value = student.phone || '';
            document.getElementById('parentPhone').value = student.parent_phone || '';
            document.getElementById('studentEmail').value = student.student_email || '';
            document.getElementById('parentEmail').value = student.parent_email || '';
            document.getElementById('saveBtn').textContent = 'تحديث';
            document.getElementById('studentModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('studentModal').style.display = 'none';
        }

        // ==========================================================
        //  حفظ الطالب (إضافة أو تعديل)
        // ==========================================================
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const studentId = document.getElementById('studentId').value.trim();
            const name = document.getElementById('studentName').value.trim();
            const grade = document.getElementById('studentGrade').value;
            const classVal = document.getElementById('studentClass').value;
            const phone = document.getElementById('studentPhone').value.trim();
            const parentPhone = document.getElementById('parentPhone').value.trim();
            const studentEmail = document.getElementById('studentEmail').value.trim();
            const parentEmail = document.getElementById('parentEmail').value.trim();

            if (!studentId || !name) {
                showAlert('الرجاء إدخال رقم الطالب واسمه', 'error');
                return;
            }

            const payload = { student_id: studentId, name, grade, class: classVal, phone, parent_phone: parentPhone, student_email: studentEmail, parent_email: parentEmail };
            const url = editId ? `/api/update_student/${editId}` : '/api/create_student';
            const method = editId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.success) {
                    showAlert(result.message, 'success');
                    closeModal();
                    loadStudents();
                } else {
                    showAlert(result.message || 'حدث خطأ', 'error');
                }
            } catch (error) {
                console.error('Error saving student:', error);
                showAlert('حدث خطأ في الاتصال', 'error');
            }
        });

        // ==========================================================
        //  حذف طالب
        // ==========================================================
        async function deleteStudent(studentId) {
            if (!confirm('هل أنت متأكد من حذف هذا الطالب؟')) return;
            try {
                const response = await fetch(`/api/delete_student/${studentId}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    showAlert(result.message, 'success');
                    loadStudents();
                } else {
                    showAlert(result.message || 'حدث خطأ', 'error');
                }
            } catch (error) {
                console.error('Error deleting student:', error);
                showAlert('حدث خطأ في الاتصال', 'error');
            }
        }

        // ==========================================================
        //  التنبيهات
        // ==========================================================
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            const className = type === 'success' ? 'alert-success' : 'alert-error';
            container.innerHTML = `<div class="alert ${className}">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }

        // ==========================================================
        //  تحميل البيانات عند فتح الصفحة
        // ==========================================================
        document.addEventListener('DOMContentLoaded', loadStudents);
    </script>

</body>
